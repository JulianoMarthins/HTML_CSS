<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Top</title>
</head>
<body>

    <header>
        <nav>
            <h1>Loja Top</h1>
        </nav>
    </header>

    <section>
        <h2>Cadastro</h2>

        <form action="obrigado.html">
            <div>
                <label for="ctrl-name">Nome:</label>
                <input id="ctrl-name" name="name" type="text" placeholder="Digite seu nome: ">
            </div>

            <div>
                <label for="ctrl-email">Email: </label>
                <input id="ctrl-email" name="email" type="email" placeholder="Digite seu email: ">
            </div>

            <div>
                <label for="ctrl-password">Senha: </label>
                <input id="ctrl-password" name="password" type="password" placeholder="Digite sua senha">
            </div>

            <div>
                <label for="ctrl-uf">Estado</label>
                <select name="uf" id="ctrl-uf">
                    <option value="1">São Paulo</option>
                    <option value="2">Santa Catarina</option>
                    <option value="3">Rio Grande do Sul</option>
                </select>
            </div>

            <div>
                <label name="school" id="ctrl-school">Escolaridade:
                    <div id="ctrl-school">
                        <input type="radio" name="level" id="ctrl-school-1">
                        <label for="ctrl-school-1"">Ensino Fundamental</label>

                        <input type="radio" name="level" id="ctrl-school-2">
                        <label for="ctrl-school-2">Ensino Médio</label>
                        
                        <input type="radio" name="level" id="ctrl-school-3">
                        <label for="ctrl-school-3">Ensino Superior</label>
                        
                        <input type="radio" name="level" id="ctrl-school-4">
                        <label for="ctrl-school-4">Pós Graduação</label>
                    </div>
                </label>
            </div>

            <div>
                <label name="languages" id="ctrl-languages">Linguagens que você conhece:</label>
                    <div id="ctrl-languages">
                        <input type="checkbox" name="languageJava" id="ctrl-languages-1">
                        <label for="ctrl-languages-1">Java</label>

                        <input type="checkbox" name="languageCshar"" id="ctrl-languages-2">
                        <label for="ctrl-languages-2">C#</label>

                        <input type="checkbox" name="languagePython" id="ctrl-languages-3">
                        <label for="ctrl-langages-3">Python</label>

                        <input type="checkbox" name="languageJs" id="ctrl-languages-4">
                        <label for="ctrl-languages-4">JavaScript</label>
                    </div>                
            </div>


            <input type="submit" value="enviar">
            <input type="reset" value="Resetar">

        </form>
    </section>
    
</body>
</html>
